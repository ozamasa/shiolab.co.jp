# データ取得・変換設定

population_summary:
  enabled: true
  type: table_by_columns

  source_name: "塩尻市 統計しおじり 人口・世帯数の推移"
  source_url: "https://www.city.shiojiri.lg.jp/uploaded/attachment/35606.xls"
  cache_file: "cache/population_summary.xls"

  sheet: "2-1"
  data_start_row: 5
  stop_when_year_blank: true

  columns:
    year:
      column: "A"
      type: year
    households:
      column: "C"
      type: int
    total:
      column: "D"
      type: int
    male:
      column: "E"
      type: int
    female:
      column: "F"
      type: int

  derived:
    people_per_household:
      formula: "total / households"
      digits: 2

  output: "public/data/population_summary.json"

  validations:
    - name: "total_equals_male_plus_female"
      type: "sum_equals"
      left: "total"
      rights: ["male", "female"]
      tolerance: 0
    - name: "people_per_household_reasonable"
      type: "range"
      field: "people_per_household"
      min: 1
      max: 10
    - name: "year_unique"
      type: "unique"
      field: "year"
    - name: "year_ascending"
      type: "ascending"
      field: "year"

population_age_groups:
  enabled: true
  type: table_by_columns

  source_name: "塩尻市 統計しおじり 年齢3区分別人口"
  source_url: "https://www.city.shiojiri.lg.jp/uploaded/attachment/35608.xls"
  cache_file: "cache/population_age_groups.xls"

  sheet: "2-3"
  data_start_row: 6
  stop_when_year_blank: true

  columns:
    year:
      column: "A"
      type: year
    total:
      column: "C"
      type: int
    young:
      column: "D"
      type: int
    working:
      column: "E"
      type: int
    elderly:
      column: "F"
      type: int

  derived:
    unknown:
      formula: "total - young - working - elderly"
      digits: 0

  output: "public/data/population_age_groups.json"

  validations:
    - name: "unknown_age_non_negative"
      type: "range"
      field: "unknown"
      min: 0
      max: 1000
    - name: "year_unique"
      type: "unique"
      field: "year"
    - name: "year_ascending"
      type: "ascending"
      field: "year"

