industry_summary:
  enabled: true
  type: row_blocks_by_year

  source_name: "塩尻市 統計しおじり 産業大分類別事業所数・従業者数"
  source_url: "https://www.city.shiojiri.lg.jp/uploaded/attachment/40533.xls"
  cache_file: "cache/industry_summary.xls"

  sheet: "3-1"
  data_start_row: 5

  row_blocks:
    - key: businesses
      match:
        column: "D"
        equals: "事業所数"

    - key: employees
      match:
        column: "D"
        equals: "従業者数"

  columns:
    year:
      column: "B"
      type: year

    total:
      column: "F"
      type: int

  merge_by_year:
    businesses:
      total: businesses

    employees:
      total: employees

  derived:
    employees_per_business:
      formula: "employees / businesses"
      digits: 2

  validations:
    - type: not_null
      fields: ["year", "businesses", "employees"]

    - type: range
      field: "employees_per_business"
      min: 1
      max: 100

    - type: unique
      field: "year"

    - type: ascending
      field: "year"

  output: "public/data/industry_summary.json"

finance_summary:
  enabled: true
  type: table_by_columns

  source_name: "塩尻市 普通会計収支状況"
  source_url: "https://www.city.shiojiri.lg.jp/uploaded/attachment/40334.xls"
  cache_file: "cache/finance_summary.xls"

  sheet: "15-1"
  data_start_row: 5
  stop_when_year_blank: false
  max_blank_years: 30

  filters:
    - column: "D"
      not_equals: "***"

  columns:
    year:
      column: "B"
      type: year

    revenue:
      column: "D"
      type: int

    expenditure:
      column: "E"
      type: int

    balance:
      column: "F"
      type: int

  validations:
    - type: unique
      field: year

    - type: ascending
      field: year

  output: "public/data/finance_summary.json"

finance_expenditure_purpose:
  enabled: true
  type: row_blocks_by_year

  source_name: "塩尻市 一般会計歳出当初予算額 目的別"
  source_url: "https://www.city.shiojiri.lg.jp/uploaded/attachment/40336.xls"
  cache_file: "cache/finance_expenditure_purpose.xls"

  sheet: "15-3【歳出】"
  data_start_row: 5

  row_blocks:
    - key: general_affairs
      match:
        column: "C"
        equals: "総務費"

    - key: welfare
      match:
        column: "C"
        equals: "民生費"

    - key: health
      match:
        column: "C"
        equals: "衛生費"

    - key: agriculture
      match:
        column: "C"
        equals: "農林水産業費"

    - key: commerce
      match:
        column: "C"
        equals: "商工費"

    - key: civil_engineering
      match:
        column: "C"
        equals: "土木費"

    - key: education
      match:
        column: "C"
        equals: "教育費"

    - key: debt
      match:
        column: "C"
        equals: "公債費"

  columns:
    year:
      column: "B"
      type: year

    amount:
      column: "D"
      type: int

    ratio:
      column: "E"
      type: float

  merge_by_year:
    general_affairs:
      amount: general_affairs_amount
      ratio: general_affairs_ratio

    welfare:
      amount: welfare_amount
      ratio: welfare_ratio

    health:
      amount: health_amount
      ratio: health_ratio

    agriculture:
      amount: agriculture_amount
      ratio: agriculture_ratio

    commerce:
      amount: commerce_amount
      ratio: commerce_ratio

    civil_engineering:
      amount: civil_engineering_amount
      ratio: civil_engineering_ratio

    education:
      amount: education_amount
      ratio: education_ratio

    debt:
      amount: debt_amount
      ratio: debt_ratio

  validations:
    - type: not_null
      fields:
        - year
        - welfare_amount
        - welfare_ratio
        - education_amount
        - education_ratio
        - civil_engineering_amount
        - civil_engineering_ratio
        - debt_amount
        - debt_ratio

    - type: unique
      field: year

    - type: ascending
      field: year

  output: "public/data/finance_expenditure_purpose.json"

population_dynamics:
  enabled: true
  type: row_filter_table
  source_name: "塩尻市 月別人口動態"
  source_url: "https://www.city.shiojiri.lg.jp/uploaded/attachment/40117.xlsx"
  cache_file: "cache/population_dynamics.xlsx"
  sheet: "2-27"
  data_start_row: 6
  filter:
    column: "C"
    equals: "合計"
  columns:
    year: { column: "B", type: year }
    household_change: { column: "D", type: int }
    population_change: { column: "E", type: int }
    births: { column: "F", type: int }
    deaths: { column: "G", type: int }
    natural_change: { column: "H", type: int }
    move_in: { column: "I", type: int }
    move_out: { column: "J", type: int }
    social_change: { column: "K", type: int }
  output: "public/data/population_dynamics.json"

